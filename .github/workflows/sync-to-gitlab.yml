name: Sync to JihuLab

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to JihuLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          echo "========================================="
          echo "开始配置 Git 用户信息..."
          echo "========================================="
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          echo "========================================="
          echo "开始配置极狐 GitLab 远程仓库..."
          echo "========================================="
          git remote add jihu https://oauth2:${GITLAB_TOKEN}@jihulab.com/wzj1122-group/jxufe-auto-evaluate.git || true

          echo "========================================="
          echo "开始强制推送代码和标签到极狐 GitLab..."
          echo "========================================="
          git push jihu --all --force
          git push jihu --tags --force

          echo "========================================="
          echo "同步完成！"
          echo "========================================="
